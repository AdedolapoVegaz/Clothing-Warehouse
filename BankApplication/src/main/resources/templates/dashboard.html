<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SecureBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7fb;
        }
        .navbar {
            background-color: #0d1b2a;
        }
        .balance-card {
            background: linear-gradient(135deg, #1b263b, #415a77);
            color: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .action-card {
            border: none;
            border-radius: 20px;
            transition: 0.3s ease;
            box-shadow: 0 6px 16px rgba(0,0,0,0);
        }
        .action-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">SecureBank</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-5">
    <div class="balance-card mb-4">
		<h2 class="fw-bold mb-2">
		    Welcome, <span th:text="${user.username}"></span>
		</h2>

        <div th:if="${account != null}">
            <p class="mb-1">Account Number: <span th:text="${account.accountNumber}"></span></p>
            <h3 class="mt-3">₦ <span th:text="${account.balance}"></span></h3>
        </div>

        <div th:if="${account == null}" class="alert alert-warning mt-3 mb-0">
            No bank account found for this user.
        </div>
    </div>

	<div class="row g-4 text-center">

	    <div class="col-6 col-md-3">
	        <a th:href="@{/deposit}" class="text-decoration-none text-dark">
	            <div class="card action-card p-4">
	                <h5 class="fw-bold">Deposit</h5>
	            </div>
	        </a>
	    </div>

	    <div class="col-6 col-md-3">
	        <a th:href="@{/withdraw}" class="text-decoration-none text-dark">
	            <div class="card action-card p-4">
	                <h5 class="fw-bold">Withdraw</h5>
	            </div>
	        </a>
	    </div>

	    <div class="col-6 col-md-3">
	        <a th:href="@{/transfer}" class="text-decoration-none text-dark">
	            <div class="card action-card p-4">
	                <h5 class="fw-bold">Transfer</h5>
	            </div>
	        </a>
	    </div>

	    <div class="col-6 col-md-3">
	        <a th:href="@{/transactions}" class="text-decoration-none text-dark">
	            <div class="card action-card p-4">
	                <h5 class="fw-bold">Transactions</h5>
	            </div>
	        </a>
	    </div>

	</div>
</div>

</body>
</html>
