<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions | SecureBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fb; }
        .table-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card table-card">
        <div class="card-body p-4 p-md-5">
            <h2 class="fw-bold mb-4">Transaction History</h2>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Description</th>
                            <th>Target Account</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="txn : ${transactions}">
                            <td th:text="${txn.transactionType}"></td>
                            <td th:text="${txn.amount}"></td>
                            <td th:text="${txn.description}"></td>
                            <td th:text="${txn.targetAccountNumber}"></td>
                            <td th:text="${txn.createdAt}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
