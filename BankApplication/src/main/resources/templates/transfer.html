<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
	        body { background-color: #f4f7fb; }
	        .form-card {
	            border: none;
	            border-radius: 24px;
	            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
	        }
	 </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="mb-4 text-center">Transfer Money</h2>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/transfer}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Receiver Account Number</label>
                            <input type="text" name="targetAccountNumber" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Amount</label>
                            <input type="number" step="0.01" name="amount" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-info w-100">Transfer</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/dashboard}">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
