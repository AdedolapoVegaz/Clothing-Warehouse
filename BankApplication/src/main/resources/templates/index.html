<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            min-height: 100vh;
            color: white;
        }
        .hero-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="hero-card text-center col-lg-8">
        <h1 class="display-4 fw-bold mb-3">SecureBank</h1>
        <p class="lead mb-4">A clean Spring Boot banking app for registration, login, deposits, withdrawals, transfers, and transaction history.</p>
        <a th:href="@{/register}" class="btn btn-light btn-lg me-3">Create Account</a>
        <a th:href="@{/login}" class="btn btn-outline-light btn-lg">Login</a>
    </div>
</div>

</body>
</html>
