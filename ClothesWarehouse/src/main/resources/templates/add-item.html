<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Clothes Warehouse</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body { min-height: 100vh; }
    .sidebar {
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      padding-top: 1rem;
      background-color: black;
      color: white;
      width: 250px;
    }
    .sidebar a { color: white; text-decoration: none; }
    .sidebar a:hover { background-color: #495057; border-radius: 4px; }
    .content { margin-left: 260px; padding: 2rem; }
  </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3">
  <h3 class="text-center mb-4">Warehouse</h3>
  <a href="/add-item" class="d-block p-2 mb-2">Add Item</a>

  <hr class="text-white">

  <h5>Items List</h5>
  <ul class="list-unstyled">
    <li class="d-flex justify-content-between align-items-center mb-2"
        th:each="i : ${items}">
      <span th:text="${i.name + ' - ' + i.brand + ', ' + i.yearOfCreation + ' ($' + i.price + ')'}"></span>

      <form th:action="@{/delete-item/{id}(id=${i.id})}" method="post" style="margin:0;">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
      </form>
    </li>
  </ul>
</div>

<div class="content">
  <div class="container">
    <h2 class="mb-4">Add New Item</h2>

    <form th:action="@{/add-item}" th:object="${item}" method="post">
      <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter item name"/>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Brand</label>
        <select th:field="*{brand}" class="form-select">
          <option value="" disabled>Select a brand</option>
          <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"></option>
        </select>
        <div th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}" class="text-danger"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Year of Creation</label>
        <input type="number" th:field="*{yearOfCreation}" class="form-control" placeholder="e.g., 2023"/>
        <div th:if="${#fields.hasErrors('yearOfCreation')}" th:errors="*{yearOfCreation}" class="text-danger"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="e.g., 199.99"/>
        <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></div>
      </div>

      <button type="submit" class="btn btn-primary">Add Item</button>
    </form>

    <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
  </div>
</div>

</body>
</html>
