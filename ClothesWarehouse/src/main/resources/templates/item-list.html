<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Clothes Warehouse Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Clothes Warehouse</h2>

        <div class="d-flex gap-2">
            <a th:href="@{/add-item}"
               sec:authorize="hasAnyRole('ADMIN','EMPLOYEE')"
               class="btn btn-success">
                Add Item
            </a>

            <a th:href="@{/admin}"
               sec:authorize="hasRole('ADMIN')"
               class="btn btn-dark">
                Admin Page
            </a>

			<form th:action="@{/logout}" method="post" class="d-inline">
			    <button type="submit" class="btn btn-danger">Logout</button>
			</form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-bordered table-striped align-middle mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Brand</th>
                        <th>Year</th>
                        <th>Price</th>
                        <th sec:authorize="hasRole('ADMIN')">Delete</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${items}">
                        <td th:text="${i.id}"></td>
                        <td th:text="${i.name}"></td>
                        <td th:text="${i.brand}"></td>
                        <td th:text="${i.yearOfCreation}"></td>
                        <td th:text="${i.price}"></td>

                        <td sec:authorize="hasRole('ADMIN')">
                            <form th:action="@{/delete-item/{id}(id=${i.id})}" method="post" class="m-0">
                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('Are you sure you want to delete this item?')">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
