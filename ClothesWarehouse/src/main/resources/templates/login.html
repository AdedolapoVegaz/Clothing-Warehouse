<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow rounded-4">
                <div class="card-body">
                    <h2 class="text-center mb-4">Clothes Warehouse Login</h2>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">Login</button>
                    </form>

                    <div class="text-danger mt-3 text-center" th:if="${param.error}">
                        Invalid username or password
                    </div>

                    <div class="text-success mt-3 text-center" th:if="${param.logout}">
                        You have logged out
                    </div>

                    <div class="text-center mt-3">
                        <a th:href="@{/register}">Create Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
